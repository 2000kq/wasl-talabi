name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Project ZIP (if exists)
        run: |
          sudo apt-get install -y unzip
          if ls *.zip 1> /dev/null 2>&1; then
            echo "✅ ZIP file found, extracting..."
            unzip -o *.zip
          else
            echo "⚠️ No ZIP file found in the root directory."
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Find and Build with Gradle
        run: |
          # البحث عن ملف الجرادل في أي مكان داخل المستودع
          GRADLEW_PATH=$(find . -name gradlew | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "❌ Error: gradlew file not found anywhere!"
            echo "Here is the current list of files in your repository:"
            ls -R
            exit 1
          fi
          
          GRADLEW_DIR=$(dirname "$GRADLEW_PATH")
          echo "✅ Found gradlew at: $GRADLEW_PATH"
          chmod +x "$GRADLEW_PATH"
          
          cd "$GRADLEW_DIR"
          ./gradlew assembleDebug

          # نقل ملف الـ APK الناتج إلى المسار الرئيسي لسهولة التحميل
          mkdir -p $GITHUB_WORKSPACE/output-apk/
          find . -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/output-apk/ \;

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasl-talabi-apk
          path: output-apk/
