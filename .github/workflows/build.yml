name: Build Android APK (Flutter)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Project ZIP
        run: |
          sudo apt-get install -y unzip
          if ls *.zip 1> /dev/null 2>&1; then
            echo "✅ ZIP file found, extracting..."
            unzip -o *.zip
          fi

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies and Build APK
        run: |
          # الدخول لمجلد المشروع إذا كان مستخرجاً داخل مجلد فرعي
          if [ -d "wasl_talabi" ]; then
            cd wasl_talabi
          fi
          
          echo "🔧 Fixing dependency conflict for intl package..."
          flutter pub add intl:^0.20.2
          
          echo "📥 Getting Flutter packages..."
          flutter pub get
          
          echo "🚀 Building APK..."
          flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasl-talabi-apk
          path: "**/build/app/outputs/flutter-apk/*.apk"
