name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Project ZIP
        run: |
          sudo apt-get install -y unzip
          unzip -o *.zip
          if [ ! -f gradlew ] && [ ! -f android/gradlew ]; then
            mv */* . 2>/dev/null || true
            mv */.* . 2>/dev/null || true
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Change permissions for gradlew
        run: chmod +x gradlew || chmod +x android/gradlew || true

      - name: Build APK
        run: |
          if [ -f gradlew ]; then
            ./gradlew assembleDebug
          elif [ -f android/gradlew ]; then
            cd android && ./gradlew assembleDebug
          else
            echo "Gradlew file not found!" && exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasl-talabi-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/debug/*.apk
