name: Build Android APK (Flutter)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Project ZIP
        run: |
          sudo apt-get install -y unzip
          if ls *.zip 1> /dev/null 2>&1; then
            echo "✅ ZIP file found, extracting..."
            unzip -o *.zip
          fi

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Install Dependencies and Build APK
        run: |
          # الدخول لمجلد المشروع إذا كان مستخرجاً داخل مجلد فرعي
          if [ -d "wasl_talabi" ]; then
            cd wasl_talabi
          fi
          
          echo "🔧 Patching Android build configuration..."
          if [ -f "android/build.gradle" ]; then
            # إجبار إعدادات أندرويد على التعرف على خصائص فلاتر في الحزم الفرعية
            if ! grep -q "evaluationDependsOn" android/build.gradle; then
              echo -e "\nsubprojects {\n    project.evaluationDependsOn(':app')\n}" >> android/build.gradle
              echo "✅ Patch applied successfully!"
            fi
          fi

          echo "📥 Getting Flutter packages..."
          flutter pub get
          
          echo "🚀 Building APK..."
          flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasl-talabi-apk
          path: "**/build/app/outputs/flutter-apk/*.apk"
