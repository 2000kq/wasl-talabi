workflows:
  flutter-android-workflow:
    name: Flutter Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    triggering:
      events:
        - push
    scripts:
      - name: Get Flutter packages
        script: |
          cd wasl_talabi
          flutter pub get
      - name: Build Android APK
        script: |
          cd wasl_talabi
          flutter build apk --debug
    artifacts:
      - wasl_talabi/build/app/outputs/flutter-apk/*.apk
